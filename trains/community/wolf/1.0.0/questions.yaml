groups:
  - name: Wolf Configuration
    description: Core Wolf game streaming server settings.
  - name: GPU Configuration
    description: GPU vendor and driver settings for hardware-accelerated video encoding.
  - name: Network Configuration
    description: >
      Configure how Wolf is reachable on your network. Host networking is
      recommended for lowest latency. If you use port mapping, ensure all
      listed ports are forwarded through your router for remote access.
  - name: Storage Configuration
    description: >
      Persistent storage for Wolf's configuration directory (/etc/wolf).
      Paired clients, certificates, and app definitions are stored here.
  - name: Advanced Configuration
    description: Additional environment variables and low-level options.

portals:
  web_portal:
    protocols:
      - http
    host:
      - $node_ip
    ports:
      - $variable-network.webPort
    path: /

questions:
  # ─── Wolf Configuration ───────────────────────────────────────────────────

  - variable: wolfConfig
    group: Wolf Configuration
    label: Wolf Configuration
    schema:
      type: dict
      attrs:
        - variable: logLevel
          label: Log Level
          description: Verbosity of Wolf's log output.
          schema:
            type: string
            default: INFO
            enum:
              - value: DEBUG
                description: Debug — verbose, useful for troubleshooting
              - value: INFO
                description: Info — recommended for normal operation
              - value: WARNING
                description: Warning — only notable events
              - value: ERROR
                description: Error — failures only

        - variable: timezone
          label: Timezone
          description: >
            Container timezone (e.g. America/New_York, Europe/London, UTC).
            See https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
          schema:
            type: string
            default: UTC

  # ─── GPU Configuration ────────────────────────────────────────────────────

  - variable: gpuConfig
    group: GPU Configuration
    label: GPU Configuration
    schema:
      type: dict
      attrs:
        - variable: gpuVendor
          label: GPU Vendor
          description: >
            Select the GPU vendor installed in your system. This controls which
            environment variables and device nodes are passed to the container.
            NVIDIA requires host-side NVIDIA drivers. AMD and Intel use the DRI
            device nodes provided by the kernel.
          schema:
            type: string
            default: nvidia
            enum:
              - value: nvidia
                description: NVIDIA (NVENC) — requires NVIDIA host drivers
              - value: amd
                description: AMD (AMF / VAAPI) — uses /dev/dri
              - value: intel
                description: Intel (QuickSync / VAAPI) — uses /dev/dri
              - value: software
                description: Software encoding — no GPU required (high CPU load)

        - variable: nvidiaVisibleDevices
          label: NVIDIA Visible Devices
          description: >
            Which NVIDIA GPUs are visible to the container. Use "all" to
            expose all GPUs, or a comma-separated list of GPU UUIDs / indices.
          schema:
            type: string
            default: all
            show_if: [["gpuVendor", "=", "nvidia"]]

        - variable: nvidiaDriverCapabilities
          label: NVIDIA Driver Capabilities
          description: >
            NVIDIA driver feature sets to enable. "all" exposes every
            capability (compute, video, utility, graphics). Reduce this for
            tighter security if you know which capabilities Wolf needs.
          schema:
            type: string
            default: all
            show_if: [["gpuVendor", "=", "nvidia"]]

  # ─── Network Configuration ────────────────────────────────────────────────

  - variable: network
    group: Network Configuration
    label: Network Configuration
    schema:
      type: dict
      attrs:
        - variable: hostNetwork
          label: Use Host Networking
          description: >
            Run the container in the host network namespace. This is strongly
            recommended — it avoids NAT on the UDP streaming ports, gives the
            lowest possible latency, and lets mDNS discovery work without
            extra configuration.
          schema:
            type: boolean
            default: true

        - variable: webPort
          label: Wolf Web UI Port
          description: >
            HTTP port for the Wolf management web interface (pairing, logs,
            app management). Also used by the TrueNAS portal link.
          schema:
            type: int
            default: 47990
            min: 1024
            max: 65535

        - variable: httpsPort
          label: HTTPS Port (Moonlight discovery)
          description: TCP port used by Moonlight for encrypted discovery. Default 47984.
          schema:
            type: int
            default: 47984
            min: 1024
            max: 65535
            show_if: [["hostNetwork", "=", false]]

        - variable: httpPort
          label: HTTP Port (Moonlight discovery)
          description: TCP port used by Moonlight for plain discovery. Default 47989.
          schema:
            type: int
            default: 47989
            min: 1024
            max: 65535
            show_if: [["hostNetwork", "=", false]]

        - variable: rtspPort
          label: RTSP Port
          description: TCP/UDP port for RTSP session negotiation. Default 48010.
          schema:
            type: int
            default: 48010
            min: 1024
            max: 65535
            show_if: [["hostNetwork", "=", false]]

        - variable: videoPort
          label: Video UDP Port
          description: Primary UDP port for video stream data. Default 47998.
          schema:
            type: int
            default: 47998
            min: 1024
            max: 65535
            show_if: [["hostNetwork", "=", false]]

        - variable: controlPort
          label: Control UDP Port (1)
          description: UDP port for stream control messages. Default 47999.
          schema:
            type: int
            default: 47999
            min: 1024
            max: 65535
            show_if: [["hostNetwork", "=", false]]

        - variable: audioPort
          label: Audio UDP Port
          description: UDP port for audio stream data. Default 48000.
          schema:
            type: int
            default: 48000
            min: 1024
            max: 65535
            show_if: [["hostNetwork", "=", false]]

        - variable: controlPort2
          label: Control UDP Port (2)
          description: Secondary UDP control port. Default 48002.
          schema:
            type: int
            default: 48002
            min: 1024
            max: 65535
            show_if: [["hostNetwork", "=", false]]

  # ─── Storage Configuration ────────────────────────────────────────────────

  - variable: storage
    group: Storage Configuration
    label: Storage Configuration
    schema:
      type: dict
      attrs:
        - variable: wolfConfig
          label: Wolf Configuration Storage
          description: >
            Where Wolf stores its configuration: TLS certificates, paired
            client records, and app definitions (config.toml).
          schema:
            type: dict
            attrs:
              - variable: type
                label: Storage Type
                schema:
                  type: string
                  default: ixVolume
                  enum:
                    - value: ixVolume
                      description: iX Volume (recommended — managed by TrueNAS)
                    - value: hostPath
                      description: Host Path (map an existing directory)

              - variable: ixVolumeConfig
                label: iX Volume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ixVolume"]]
                  $ref:
                    - "normalize/ixVolume"
                  attrs:
                    - variable: datasetName
                      label: Dataset Name
                      description: Name of the TrueNAS dataset to create for Wolf config.
                      schema:
                        type: string
                        required: true
                        default: wolf-config
                        immutable: true

              - variable: hostPathConfig
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "hostPath"]]
                  attrs:
                    - variable: hostPath
                      label: Host Path
                      description: Absolute path on the TrueNAS host for Wolf configuration.
                      schema:
                        type: hostpath
                        required: true

  # ─── Advanced Configuration ───────────────────────────────────────────────

  - variable: advanced
    group: Advanced Configuration
    label: Advanced Configuration
    schema:
      type: dict
      attrs:
        - variable: exposeDockerSocket
          label: Expose Docker Socket
          description: >
            Give Wolf access to the Docker socket so it can start and stop
            per-session game containers. Required for Wolf's default app
            definitions. Disable only if you are using a custom setup that
            does not need container management.
          schema:
            type: boolean
            default: true

        - variable: additionalEnv
          label: Additional Environment Variables
          description: Extra environment variables passed to the Wolf container.
          schema:
            type: list
            default: []
            items:
              - variable: envItem
                label: Environment Variable
                schema:
                  type: dict
                  attrs:
                    - variable: name
                      label: Name
                      schema:
                        type: string
                        required: true
                    - variable: value
                      label: Value
                      schema:
                        type: string
                        required: true
