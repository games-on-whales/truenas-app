groups:
  - name: Wolf Configuration
    description: Core Wolf game streaming server settings.
  - name: Wolf Den Configuration
    description: >
      Wolf Den is the web management dashboard for Wolf. It communicates with
      Wolf via a Unix socket (not HTTP) and provides pairing, session monitoring,
      and app management. Enabled by default on port 8080.
  - name: GPU Configuration
    description: >
      GPU vendor and render node for hardware-accelerated video encoding.
      NVIDIA users must also ensure the nvidia-driver-vol Docker volume exists
      before deploying (see app-readme.md).
  - name: Storage Configuration
    description: >
      Persistent storage for Wolf's configuration, Steam data, Wolf Den state,
      and game cover art. Each is a separate volume so they can be managed
      and backed up independently.
  - name: Advanced Configuration
    description: Extra environment variables passed to the Wolf container.

portals:
  web_portal:
    protocols:
      - http
    host:
      - $node_ip
    ports:
      - $variable-wolfDen.port
    path: /

questions:
  # ─── Wolf Configuration ───────────────────────────────────────────────────

  - variable: wolfConfig
    group: Wolf Configuration
    label: Wolf Configuration
    schema:
      type: dict
      attrs:
        - variable: renderNode
          label: GPU Render Node
          description: >
            DRI render device that Wolf uses for GPU encoding and display.
            Run 'ls /dev/dri/' on the TrueNAS host to find the right node.
            Usually /dev/dri/renderD128 for the first GPU.
          schema:
            type: string
            default: /dev/dri/renderD128
            required: true

        - variable: timezone
          label: Timezone
          description: >
            Container timezone (e.g. America/New_York, Europe/London, UTC).
            See https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
          schema:
            type: string
            default: UTC

  # ─── Wolf Den Configuration ──────────────────────────────────────────────

  - variable: wolfDen
    group: Wolf Den Configuration
    label: Wolf Den Configuration
    schema:
      type: dict
      attrs:
        - variable: enabled
          label: Enable Wolf Den
          description: >
            Run the Wolf Den management dashboard alongside Wolf. Wolf Den
            communicates with Wolf via a Unix socket; no HTTP API access is
            needed. Disable only if you manage Wolf entirely via config files.
          schema:
            type: boolean
            default: true

        - variable: port
          label: Wolf Den Port
          description: >
            Host port for the Wolf Den web UI. This is also the port used for
            the TrueNAS app portal link.
          schema:
            type: int
            default: 8080
            min: 1024
            max: 65535
            show_if: [["enabled", "=", true]]

        - variable: socketTimeout
          label: Socket Connection Timeout (seconds)
          description: >
            How long Wolf Den waits for Wolf's Unix socket to become available
            on startup. Increase if Wolf takes a long time to initialise.
          schema:
            type: int
            default: 60
            min: 10
            max: 300
            show_if: [["enabled", "=", true]]

  # ─── GPU Configuration ────────────────────────────────────────────────────

  - variable: gpuConfig
    group: GPU Configuration
    label: GPU Configuration
    schema:
      type: dict
      attrs:
        - variable: gpuVendor
          label: GPU Vendor
          description: >
            Select the GPU vendor installed in your system. This controls which
            environment variables and device nodes are passed to the container.
            NVIDIA requires host-side NVIDIA drivers. AMD and Intel use the DRI
            device nodes provided by the kernel.
          schema:
            type: string
            default: nvidia
            enum:
              - value: nvidia
                description: NVIDIA (NVENC) — requires host NVIDIA drivers + nvidia-driver-vol
              - value: amd
                description: AMD (AMF / VAAPI) — uses /dev/dri
              - value: intel
                description: Intel (QuickSync / VAAPI) — uses /dev/dri

        - variable: nvidiaVisibleDevices
          label: NVIDIA Visible Devices
          description: >
            Which NVIDIA GPUs are visible to the container. Use "all" to
            expose all GPUs, or a comma-separated list of GPU UUIDs / indices.
          schema:
            type: string
            default: all
            show_if: [["gpuVendor", "=", "nvidia"]]

        - variable: nvidiaDriverCapabilities
          label: NVIDIA Driver Capabilities
          description: >
            NVIDIA driver feature sets to enable. "all" exposes every
            capability (compute, video, utility, graphics). Reduce this for
            tighter security if you know which capabilities Wolf needs.
          schema:
            type: string
            default: all
            show_if: [["gpuVendor", "=", "nvidia"]]

  # ─── Storage Configuration ────────────────────────────────────────────────

  - variable: storage
    group: Storage Configuration
    label: Storage Configuration
    schema:
      type: dict
      attrs:
        - variable: cfg
          label: Wolf Configuration (/etc/wolf/cfg)
          description: >
            config.toml, TLS certificates, and paired Moonlight client records.
            Losing this volume requires re-pairing all clients.
          schema:
            type: dict
            attrs:
              - variable: type
                label: Storage Type
                schema:
                  type: string
                  default: ixVolume
                  enum:
                    - value: ixVolume
                      description: iX Volume (recommended)
                    - value: hostPath
                      description: Host Path
              - variable: ixVolumeConfig
                label: iX Volume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ixVolume"]]
                  $ref:
                    - "normalize/ixVolume"
                  attrs:
                    - variable: datasetName
                      label: Dataset Name
                      schema:
                        type: string
                        required: true
                        default: wolf-cfg
                        immutable: true
              - variable: hostPathConfig
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "hostPath"]]
                  attrs:
                    - variable: hostPath
                      label: Host Path
                      schema:
                        type: hostpath
                        required: true

        - variable: steam
          label: Steam Data (/etc/wolf/steam)
          description: Steam library metadata and per-app persistent state.
          schema:
            type: dict
            attrs:
              - variable: type
                label: Storage Type
                schema:
                  type: string
                  default: ixVolume
                  enum:
                    - value: ixVolume
                      description: iX Volume (recommended)
                    - value: hostPath
                      description: Host Path
              - variable: ixVolumeConfig
                label: iX Volume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ixVolume"]]
                  $ref:
                    - "normalize/ixVolume"
                  attrs:
                    - variable: datasetName
                      label: Dataset Name
                      schema:
                        type: string
                        required: true
                        default: wolf-steam
                        immutable: true
              - variable: hostPathConfig
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "hostPath"]]
                  attrs:
                    - variable: hostPath
                      label: Host Path
                      schema:
                        type: hostpath
                        required: true

        - variable: wolfDen
          label: Wolf Den Data (/app/wolf-den)
          description: Wolf Den session database and user settings.
          schema:
            type: dict
            attrs:
              - variable: type
                label: Storage Type
                schema:
                  type: string
                  default: ixVolume
                  enum:
                    - value: ixVolume
                      description: iX Volume (recommended)
                    - value: hostPath
                      description: Host Path
              - variable: ixVolumeConfig
                label: iX Volume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ixVolume"]]
                  $ref:
                    - "normalize/ixVolume"
                  attrs:
                    - variable: datasetName
                      label: Dataset Name
                      schema:
                        type: string
                        required: true
                        default: wolf-den
                        immutable: true
              - variable: hostPathConfig
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "hostPath"]]
                  attrs:
                    - variable: hostPath
                      label: Host Path
                      schema:
                        type: hostpath
                        required: true

        - variable: covers
          label: Cover Art (/etc/wolf/covers)
          description: Game cover images displayed in Wolf Den and Moonlight clients.
          schema:
            type: dict
            attrs:
              - variable: type
                label: Storage Type
                schema:
                  type: string
                  default: ixVolume
                  enum:
                    - value: ixVolume
                      description: iX Volume (recommended)
                    - value: hostPath
                      description: Host Path
              - variable: ixVolumeConfig
                label: iX Volume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ixVolume"]]
                  $ref:
                    - "normalize/ixVolume"
                  attrs:
                    - variable: datasetName
                      label: Dataset Name
                      schema:
                        type: string
                        required: true
                        default: wolf-covers
                        immutable: true
              - variable: hostPathConfig
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "hostPath"]]
                  attrs:
                    - variable: hostPath
                      label: Host Path
                      schema:
                        type: hostpath
                        required: true

  # ─── Advanced Configuration ───────────────────────────────────────────────

  - variable: advanced
    group: Advanced Configuration
    label: Advanced Configuration
    schema:
      type: dict
      attrs:
        - variable: additionalEnv
          label: Additional Environment Variables
          description: Extra environment variables passed to the Wolf container only.
          schema:
            type: list
            default: []
            items:
              - variable: envItem
                label: Environment Variable
                schema:
                  type: dict
                  attrs:
                    - variable: name
                      label: Name
                      schema:
                        type: string
                        required: true
                    - variable: value
                      label: Value
                      schema:
                        type: string
                        required: true
